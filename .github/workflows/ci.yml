name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 mypy

      - name: Flake8 lint
        run: flake8 src/ tests/ --max-line-length 120 --ignore E501,W503,E203,E128

      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend lint
        run: pnpm lint

      - name: Build frontend
        run: pnpm frontend:build

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Verify config
        run: python -c "import json; json.load(open('config.json')); print('Config OK')"

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, frontend, test]
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile run_live_adaptive.py && python -m compileall src/ -q

      - name: Verify imports
        run: python -c "from src.strategy import StrategyEngine; from src.trade_engine import TradeEngine; print('All imports OK')"
