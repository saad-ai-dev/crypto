name: Delete PR Branch On Close

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-branch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch and comment
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const protectedBranches = new Set(["main", "master", "develop", "development"]);

            if (!branch || protectedBranches.has(branch)) {
              core.info(`Skipping branch cleanup for ${branch || "unknown branch"}.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Workflow cleanup deleted branch \`${branch}\` because this pull request was closed.`,
              });
            } catch (error) {
              core.setFailed(`Branch cleanup failed for ${branch}: ${error.message}`);
            }
