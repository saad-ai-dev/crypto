name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  title-check:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            Fix
            docs
            Docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

  branch-check:
    name: Branch Naming
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feature|fix|hotfix|docs|refactor|test|chore)/[a-z0-9._-]+$"
          if [[ "$BRANCH" =~ $PATTERN ]] || [[ "$BRANCH" == "main" ]] || [[ "$BRANCH" == "develop" ]]; then
            echo "Branch name '$BRANCH' is valid"
          else
            echo "::warning::Branch '$BRANCH' doesn't follow convention: {type}/{description}"
          fi
