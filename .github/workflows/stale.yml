name: Stale Issues

on:
  schedule:
    - cron: "0 0 * * *" # Daily midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. Please comment if this is still relevant.
          stale-pr-message: >
            This PR has been inactive for 14 days and will be closed in 7 days
            unless updated.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,dependencies
